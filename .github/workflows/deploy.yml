name: Deploy to GitHub Pages

# This repo is the source of truth for the laser-cut deck box builder. Every push
# to main builds the app and publishes it to GitHub Pages; jonas-jensen.com embeds
# the live deploy by proxying /apps/laser-deck-box/* to the Pages URL, so pushing
# here is what ships the change to the desktop — nothing is re-vendored by hand.
#
# The app depends on the sibling parametric-kit via a `link:../parametric-kit`
# path, and imports the kit's built dist/ (which is gitignored, so it must be
# rebuilt in CI). actions/checkout can only write inside $GITHUB_WORKSPACE, so we
# can't recreate the local `../parametric-kit` sibling above the workspace.
# Instead we check out BOTH repos into subdirectories (app/ and parametric-kit/):
# from app/, `../parametric-kit` then resolves to the sibling checkout, exactly
# like the local layout. We build the kit first so its dist/ exists before the
# app installs (link:) and builds against it.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: app
      - uses: actions/checkout@v6
        with:
          repository: j0nas/parametric-kit
          path: parametric-kit
      - uses: pnpm/action-setup@v6
        with:
          # No root package.json here (two sibling checkouts), so action-setup
          # can't read a packageManager field — pin the version both repos use.
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: app/.node-version
          cache: pnpm
          cache-dependency-path: |
            app/pnpm-lock.yaml
            parametric-kit/pnpm-lock.yaml
      # Build the kit first: the app's link: dep imports its dist/, which is
      # gitignored and must be produced here.
      - name: Build parametric-kit
        working-directory: parametric-kit
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Install app
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Test app
        working-directory: app
        # The `test` script is already `vp test --run`; don't append another
        # --run (vitest rejects the duplicated single-value option).
        run: pnpm test
      - name: Build app
        working-directory: app
        run: pnpm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
