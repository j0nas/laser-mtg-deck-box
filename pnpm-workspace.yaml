allowBuilds:
  sharp: false # transitive via manifold-3d's gltf tooling; unused here (no manifold/csg in this app)
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  ignoreMissing:
    - manifold-3d
